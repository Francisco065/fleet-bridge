<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fleet Bridge - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); min-height: 100vh; }
    .glass { backdrop-filter: blur(20px); background: rgba(30,41,59,0.85); border: 1px solid rgba(148,163,184,0.15); }
    .btn-gradient { background: linear-gradient(135deg, #3b82f6, #1d4ed8); transition: all 0.2s; }
    .btn-gradient:hover { background: linear-gradient(135deg, #2563eb, #1e40af); transform: translateY(-1px); }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .float { animation: float 3s ease-in-out infinite; }
    @keyframes pulse-slow { 0%,100%{opacity:0.4} 50%{opacity:0.7} }
    .pulse-slow { animation: pulse-slow 4s ease-in-out infinite; }
    input:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px #1e293b inset !important; -webkit-text-fill-color: #e2e8f0 !important; }
    .input-dark { background: rgba(15,23,42,0.6); border: 1px solid rgba(148,163,184,0.2); color: #e2e8f0; border-radius: 12px; padding: 12px 16px 12px 44px; width: 100%; outline: none; transition: all 0.2s; font-size: 14px; }
    .input-dark:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
  </style>
</head>
<body class="flex items-center justify-center p-4">
  <!-- Blobs decorativos -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="pulse-slow absolute top-1/4 left-1/4 w-72 h-72 bg-blue-600/10 rounded-full blur-3xl"></div>
    <div class="pulse-slow absolute bottom-1/3 right-1/4 w-96 h-96 bg-indigo-600/10 rounded-full blur-3xl" style="animation-delay:2s"></div>
    <div class="pulse-slow absolute top-2/3 left-1/2 w-64 h-64 bg-cyan-600/8 rounded-full blur-3xl" style="animation-delay:1s"></div>
  </div>

  <div class="w-full max-w-md relative z-10">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="float inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 shadow-2xl shadow-blue-500/40 mb-5">
        <i class="fas fa-route text-white text-3xl"></i>
      </div>
      <h1 class="text-3xl font-bold text-white tracking-tight">Fleet Bridge</h1>
      <p class="text-slate-400 mt-1.5 text-sm">Plataforma de Monitoramento Veicular</p>
    </div>

    <!-- Card -->
    <div class="glass rounded-2xl p-8 shadow-2xl">
      <h2 class="text-lg font-semibold text-white mb-6">Acesse sua conta</h2>

      <div id="alert-box" class="hidden mb-5 p-3.5 rounded-xl text-sm font-medium flex items-center gap-2"></div>

      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-2">E-mail</label>
          <div class="relative">
            <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm pointer-events-none"></i>
            <input type="email" id="email" class="input-dark" placeholder="email@empresa.com.br" value="admin@fleetbridge.com.br" required autocomplete="email">
          </div>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-2">Senha</label>
          <div class="relative">
            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm pointer-events-none"></i>
            <input type="password" id="senha" class="input-dark pr-12" placeholder="••••••••" value="demo123" required autocomplete="current-password">
            <button type="button" id="toggleSenha" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition">
              <i class="fas fa-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" id="btnLogin"
          class="btn-gradient w-full py-3.5 rounded-xl text-white font-semibold text-sm shadow-lg shadow-blue-500/25 flex items-center justify-center gap-2">
          <i class="fas fa-sign-in-alt"></i>
          <span>Entrar</span>
        </button>
      </form>

      <!-- Demo credentials box -->
      <div class="mt-6 p-4 rounded-xl bg-blue-500/10 border border-blue-500/20">
        <div class="flex items-center gap-2 mb-2">
          <i class="fas fa-info-circle text-blue-400 text-xs"></i>
          <span class="text-xs font-semibold text-blue-400">Credenciais de demonstração</span>
        </div>
        <div class="grid grid-cols-2 gap-2 text-xs">
          <div>
            <span class="text-slate-500">E-mail:</span>
            <span class="text-slate-300 ml-1">admin@fleetbridge.com.br</span>
          </div>
          <div>
            <span class="text-slate-500">Senha:</span>
            <span class="text-slate-300 ml-1">demo123</span>
          </div>
        </div>
      </div>
    </div>

    <p class="text-center text-xs text-slate-600 mt-6">Fleet Bridge &copy; 2024 &mdash; Todos os direitos reservados</p>
  </div>

  <script>
    // Toggle senha
    document.getElementById('toggleSenha').addEventListener('click', function() {
      var input = document.getElementById('senha');
      var icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
      }
    });

    function showAlert(msg, type) {
      var box = document.getElementById('alert-box');
      box.className = 'mb-5 p-3.5 rounded-xl text-sm font-medium flex items-center gap-2';
      if (type === 'error') {
        box.classList.add('bg-red-500/15', 'text-red-400', 'border', 'border-red-500/30');
        box.innerHTML = '<i class="fas fa-exclamation-circle flex-shrink-0"></i><span>' + msg + '</span>';
      } else {
        box.classList.add('bg-green-500/15', 'text-green-400', 'border', 'border-green-500/30');
        box.innerHTML = '<i class="fas fa-check-circle flex-shrink-0"></i><span>' + msg + '</span>';
      }
      box.classList.remove('hidden');
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var btn = document.getElementById('btnLogin');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Entrando...</span>';

      var email = document.getElementById('email').value.trim();
      var senha = document.getElementById('senha').value;

      try {
        // Primeiro garantir setup
        await fetch('/api/setup', { method: 'POST' });

        var res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, senha: senha })
        });
        var data = await res.json();

        if (res.ok && data.token) {
          localStorage.setItem('fleet_token', data.token);
          localStorage.setItem('fleet_user', JSON.stringify(data.usuario));
          showAlert('Login realizado com sucesso! Redirecionando...', 'success');
          setTimeout(function() { window.location.href = '/'; }, 800);
        } else {
          showAlert(data.error || 'E-mail ou senha incorretos.', 'error');
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-sign-in-alt"></i><span>Entrar</span>';
        }
      } catch (err) {
        showAlert('Erro de conexão. Tente novamente.', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i><span>Entrar</span>';
      }
    });
  </script>
</body>
</html>
